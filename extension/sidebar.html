<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgenticWeb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#0f0f13;color:#e5e5e5;display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#18181f;border-bottom:1px solid #2a2a3a}
.logo{width:22px;height:22px;background:#7c3aed;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.title{font-weight:600;font-size:13px;flex:1}
.dot{width:7px;height:7px;border-radius:50%;background:#374151}
.dot.on{background:#22c55e} .dot.busy{background:#f59e0b}
.provider-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#13131a;border-bottom:1px solid #2a2a3a}
.provider-bar label{color:#6b7280;font-size:11px}
.provider-bar select{flex:1;font-size:11px;padding:3px 6px;border:1px solid #374151;border-radius:4px;background:#1f1f2e;color:#e5e5e5}
#page-ctx{display:none;margin:6px 12px 0;font-size:10px;background:#1e1b4b;color:#818cf8;border-radius:4px;padding:3px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#page-ctx.show{display:block}
.chat{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av.user{background:#4f46e5;color:#fff}
.av.agent{background:#7c3aed;color:#fff}
.bubble{max-width:85%;padding:7px 10px;border-radius:10px;line-height:1.5;font-size:12px}
.bubble.user{background:#3730a3;color:#e0e7ff}
.bubble.agent{background:#1f1f2e;color:#e5e5e5;border:1px solid #2a2a3a}
.log{font-size:10px;color:#6b7280;font-family:monospace;display:flex;gap:5px;align-items:flex-start;margin:2px 0}
.ld{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ld.p{background:#f59e0b} .ld.d{background:#22c55e} .ld.e{background:#ef4444}
.result{margin-top:8px;padding:8px;background:#052e16;border:1px solid #166534;border-radius:6px;font-size:11px;color:#bbf7d0;white-space:pre-wrap}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#374151;text-align:center;padding:20px;font-size:12px}
.suggestions{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px}
.sug{font-size:10px;padding:3px 8px;border:1px solid #374151;border-radius:12px;cursor:pointer;color:#9ca3af;background:#18181f;white-space:nowrap}
.sug:hover{background:#1e1b4b;border-color:#7c3aed;color:#a78bfa}
.input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid #2a2a3a;background:#18181f}
.input-row textarea{flex:1;font-size:12px;padding:7px 10px;border:1px solid #374151;border-radius:8px;resize:none;height:36px;max-height:80px;font-family:inherit;background:#0f0f13;color:#e5e5e5}
.input-row textarea:focus{outline:none;border-color:#7c3aed}
.send{width:36px;height:36px;background:#7c3aed;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send:hover{background:#6d28d9} .send:disabled{background:#374151;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <div class="logo">AW</div>
  <span class="title">AgenticWeb</span>
  <div class="dot" id="dot"></div>
</div>
<div class="provider-bar">
  <label>Model:</label>
  <select id="prov">
    <option value="azure_openai">Azure OpenAI (Microsoft)</option>
    <option value="gemini">Gemini 1.5 Flash (free)</option>
    <option value="openrouter_qwen">OpenRouter Qwen (free)</option>
    <option value="openrouter_free">OpenRouter Free Router</option>
    <option value="openrouter_auto">OpenRouter Auto (paid)</option>
    <option value="groq">Groq Llama 3.3 (free)</option>
    <option value="deepseek">DeepSeek V4 Flash</option>
    <option value="claude">Claude Sonnet</option>
    <option value="openai">GPT-4o Mini</option>
  </select>
</div>
<div id="page-ctx"></div>
<div class="chat" id="chat">
  <div class="empty" id="empty">🌐<br>Type a goal — I'll browse the web for you</div>
</div>
<div class="suggestions" id="sugs">
  <span class="sug" onclick="fill('Find cheapest flight today')">✈ Cheapest flight</span>
  <span class="sug" onclick="fill('Summarise this page')">📄 Summarise page</span>
  <span class="sug" onclick="fill('Top news today')">📰 Top news</span>
</div>
<div class="input-row">
  <textarea id="inp" placeholder="Type a goal…" onkeydown="key(event)"></textarea>
  <button class="send" id="btn" onclick="send()">➤</button>
</div>
<script>
let running=false, curBubble=null, curLog=null

document.addEventListener('DOMContentLoaded',()=>{ loadSettings(); updateCtx(); checkHealth() })
document.getElementById('prov').addEventListener('change',e=>{
  chrome.runtime.sendMessage({type:'SAVE_SETTINGS',provider:e.target.value})
})
chrome.runtime.onMessage.addListener(msg=>{
  if(msg.type==='TASK_START') onStart(msg.goal)
  if(msg.type==='AGENT_EVENT') onEvent(msg.event)
  if(msg.type==='ERROR') onError(msg.message)
})

function send(){
  if(running) return
  const goal=document.getElementById('inp').value.trim()
  if(!goal) return
  document.getElementById('inp').value=''
  document.getElementById('empty')?.remove()
  document.getElementById('sugs').style.display='none'
  addUser(goal)
  const p=document.getElementById('prov').value
  chrome.runtime.sendMessage({type:'RUN_GOAL',goal,provider:p})
}
function key(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} }
function fill(t){ document.getElementById('inp').value=t; document.getElementById('inp').focus() }

function onStart(goal){
  running=true
  document.getElementById('btn').disabled=true
  setDot('busy')
  curBubble=addAgentBubble()
  curLog=addLogContainer(curBubble)
}
function onEvent(ev){
  if(!curBubble){ curBubble=addAgentBubble(); curLog=addLogContainer(curBubble) }
  if(ev.type==='status') addLog(curLog,ev.message,'p')
  else if(ev.type==='step') addLog(curLog,`✓ ${ev.tool}: ${(ev.result||'').slice(0,80)}`,'d')
  else if(ev.type==='done'){ addResult(curBubble,ev.result); finish() }
  else if(ev.type==='error'){ addLog(curLog,`✗ ${ev.message}`,'e'); finish() }
  scroll()
}
function onError(m){ if(!curBubble){curBubble=addAgentBubble();curLog=addLogContainer(curBubble)} addLog(curLog,`✗ ${m}`,'e'); finish() }
function finish(){ running=false; document.getElementById('btn').disabled=false; setDot('on'); curBubble=null; curLog=null }

function addUser(t){
  const chat=document.getElementById('chat')
  const d=document.createElement('div'); d.className='msg user'
  d.innerHTML=`<div class="av user">You</div><div class="bubble user">${esc(t)}</div>`
  chat.appendChild(d); scroll()
}
function addAgentBubble(){
  const chat=document.getElementById('chat')
  const d=document.createElement('div'); d.className='msg'
  d.innerHTML=`<div class="av agent">AW</div><div class="bubble agent" id="b${Date.now()}"></div>`
  chat.appendChild(d); return d.querySelector('.bubble.agent')
}
function addLogContainer(b){ const c=document.createElement('div'); b.appendChild(c); return c }
function addLog(c,t,s){
  const prev=c.querySelectorAll('.log')
  if(prev.length){ const ld=prev[prev.length-1].querySelector('.ld'); if(ld?.classList.contains('p')){ld.classList.remove('p');ld.classList.add('d')} }
  const d=document.createElement('div'); d.className='log'
  d.innerHTML=`<span class="ld ${s}"></span><span>${esc(t)}</span>`
  c.appendChild(d)
}
function addResult(b,r){
  b.querySelectorAll('.ld.p').forEach(d=>{d.classList.remove('p');d.classList.add('d')})
  const box=document.createElement('div'); box.className='result'; box.textContent=r; b.appendChild(box)
}
function setDot(s){ const d=document.getElementById('dot'); d.className='dot '+(s==='on'?'on':s==='busy'?'busy':'') }
function scroll(){ const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

async function loadSettings(){
  chrome.runtime.sendMessage({type:'GET_SETTINGS'},s=>{ if(s?.provider) document.getElementById('prov').value=s.provider })
}
async function updateCtx(){
  const [tab]=await chrome.tabs.query({active:true,currentWindow:true})
  if(tab?.url&&!tab.url.startsWith('chrome://')){
    const el=document.getElementById('page-ctx')
    el.textContent=`📄 ${tab.title||tab.url}`; el.classList.add('show')
  }
}
async function checkHealth(){
  try{
    const r=await fetch('http://localhost:8765/health',{signal:AbortSignal.timeout(2000)})
    if(r.ok) setDot('on')
    else throw new Error()
  }catch{
    setDot('')
    const chat=document.getElementById('chat')
    const w=document.createElement('div')
    w.style.cssText='font-size:11px;color:#92400e;background:#78350f22;border:1px solid #78350f;padding:6px 10px;border-radius:6px;margin:4px 0;'
    w.textContent='⚠ Agent offline — run ./scripts/start.sh'; chat.appendChild(w)
  }
}
</script>
</body>
</html>
