<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgenticWeb</title>
<style>
:root{color-scheme:light;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--brand:#0f172a;--accent:#0284c7;--ok:#059669;--warn:#d97706;--bad:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:var(--soft);color:var(--ink);display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--line)}
.logo{width:30px;height:30px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:.02em}
.title-wrap{min-width:0;flex:1}
.title{font-weight:700;font-size:14px;line-height:1.2}
.caption{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.15)}
.dot.on{background:var(--ok);box-shadow:0 0 0 3px rgba(5,150,105,.14)} .dot.busy{background:var(--warn);box-shadow:0 0 0 3px rgba(217,119,6,.14)}
.provider-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#fff;border-bottom:1px solid var(--line)}
.provider-bar label{color:var(--muted);font-size:11px;font-weight:600}
.provider-bar select{min-width:0;flex:1;font-size:11px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
#page-ctx{display:none;margin:10px 14px 0;font-size:11px;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:999px;padding:5px 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#page-ctx.show{display:block}
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av.user{background:var(--accent);color:#fff}
.av.agent{background:#fff;color:var(--ink);border:1px solid var(--line)}
.bubble{max-width:86%;padding:9px 11px;border-radius:12px;line-height:1.5;font-size:12px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.bubble.user{background:var(--accent);color:#fff}
.bubble.agent{background:#fff;color:#1e293b;border:1px solid var(--line)}
.log{font-size:10px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;display:flex;gap:6px;align-items:flex-start;margin:3px 0}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ld.p{background:var(--warn)} .ld.d{background:var(--ok)} .ld.e{background:var(--bad)}
.result{margin-top:8px;padding:9px;background:#ecfdf5;border:1px solid #bbf7d0;border-radius:9px;font-size:11px;color:#065f46;white-space:pre-wrap}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:20px;font-size:12px}
.empty-mark{width:46px;height:46px;border-radius:14px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:800;font-size:15px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.sug{font-size:11px;padding:6px 9px;border:1px solid var(--line);border-radius:999px;cursor:pointer;color:#475569;background:#fff;white-space:nowrap}
.sug:hover{border-color:#cbd5e1;background:#f8fafc;color:var(--ink)}
.input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#fff}
.input-row textarea{flex:1;font-size:12px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;resize:none;height:40px;max-height:86px;font-family:inherit;background:var(--soft);color:var(--ink);line-height:1.4}
.input-row textarea:focus{outline:none;border-color:#94a3b8;background:#fff}
.send{width:40px;height:40px;background:var(--brand);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send:hover{background:#1e293b} .send:disabled{background:#cbd5e1;cursor:not-allowed;color:#64748b}
</style>
</head>
<body>
<div class="header">
  <div class="logo">AW</div>
  <div class="title-wrap">
    <div class="title">AgenticWeb</div>
    <div class="caption">Browse, extract, compare</div>
  </div>
  <div class="dot" id="dot"></div>
</div>
<div class="provider-bar">
  <label>Model</label>
  <select id="prov">
    <option value="azure_openai">Azure OpenAI</option>
    <option value="gemini">Gemini 1.5 Flash (free)</option>
    <option value="openrouter_qwen">OpenRouter Qwen (free)</option>
    <option value="openrouter_free">OpenRouter Free Router</option>
    <option value="openrouter_auto">OpenRouter Auto (paid)</option>
    <option value="groq">Groq Llama 3.3 (free)</option>
    <option value="deepseek">DeepSeek V4 Flash</option>
    <option value="claude">Claude Sonnet</option>
    <option value="openai">GPT-4o Mini</option>
  </select>
</div>
<div id="page-ctx"></div>
<div class="chat" id="chat">
  <div class="empty" id="empty">
    <div class="empty-mark">AW</div>
    <div>Type a goal. AgenticWeb will work through the web for you.</div>
  </div>
</div>
<div class="suggestions" id="sugs">
  <span class="sug" onclick="fill('Find cheapest flight today')">Cheapest flight</span>
  <span class="sug" onclick="fill('Summarize this page')">Summarize page</span>
  <span class="sug" onclick="fill('Top news today')">Top news</span>
</div>
<div class="input-row">
  <textarea id="inp" placeholder="Type a goal..." onkeydown="key(event)"></textarea>
  <button class="send" id="btn" title="Send" onclick="send()">&#8594;</button>
</div>
<script>
let running=false, curBubble=null, curLog=null

document.addEventListener('DOMContentLoaded',()=>{ loadSettings(); updateCtx(); checkHealth() })
document.getElementById('prov').addEventListener('change',e=>{
  chrome.runtime.sendMessage({type:'SAVE_SETTINGS',provider:e.target.value})
})
chrome.runtime.onMessage.addListener(msg=>{
  if(msg.type==='TASK_START') onStart(msg.goal)
  if(msg.type==='AGENT_EVENT') onEvent(msg.event)
  if(msg.type==='ERROR') onError(msg.message)
})

function send(){
  if(running) return
  const goal=document.getElementById('inp').value.trim()
  if(!goal) return
  document.getElementById('inp').value=''
  document.getElementById('empty')?.remove()
  document.getElementById('sugs').style.display='none'
  addUser(goal)
  const p=document.getElementById('prov').value
  chrome.runtime.sendMessage({type:'RUN_GOAL',goal,provider:p})
}
function key(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} }
function fill(t){ document.getElementById('inp').value=t; document.getElementById('inp').focus() }

function onStart(goal){
  running=true
  document.getElementById('btn').disabled=true
  setDot('busy')
  curBubble=addAgentBubble()
  curLog=addLogContainer(curBubble)
}
function onEvent(ev){
  if(!curBubble){ curBubble=addAgentBubble(); curLog=addLogContainer(curBubble) }
  if(ev.type==='status') addLog(curLog,ev.message,'p')
  else if(ev.type==='step') addLog(curLog,`OK ${ev.tool}: ${(ev.result||'').slice(0,80)}`,'d')
  else if(ev.type==='done'){ addResult(curBubble,ev.result); finish() }
  else if(ev.type==='error'){ addLog(curLog,`Error ${ev.message}`,'e'); finish() }
  scroll()
}
function onError(m){ if(!curBubble){curBubble=addAgentBubble();curLog=addLogContainer(curBubble)} addLog(curLog,`Error ${m}`,'e'); finish() }
function finish(){ running=false; document.getElementById('btn').disabled=false; setDot('on'); curBubble=null; curLog=null }

function addUser(t){
  const chat=document.getElementById('chat')
  const d=document.createElement('div'); d.className='msg user'
  d.innerHTML=`<div class="av user">You</div><div class="bubble user">${esc(t)}</div>`
  chat.appendChild(d); scroll()
}
function addAgentBubble(){
  const chat=document.getElementById('chat')
  const d=document.createElement('div'); d.className='msg'
  d.innerHTML=`<div class="av agent">AW</div><div class="bubble agent" id="b${Date.now()}"></div>`
  chat.appendChild(d); return d.querySelector('.bubble.agent')
}
function addLogContainer(b){ const c=document.createElement('div'); b.appendChild(c); return c }
function addLog(c,t,s){
  const prev=c.querySelectorAll('.log')
  if(prev.length){ const ld=prev[prev.length-1].querySelector('.ld'); if(ld?.classList.contains('p')){ld.classList.remove('p');ld.classList.add('d')} }
  const d=document.createElement('div'); d.className='log'
  d.innerHTML=`<span class="ld ${s}"></span><span>${esc(t)}</span>`
  c.appendChild(d)
}
function addResult(b,r){
  b.querySelectorAll('.ld.p').forEach(d=>{d.classList.remove('p');d.classList.add('d')})
  const box=document.createElement('div'); box.className='result'; box.textContent=r; b.appendChild(box)
}
function setDot(s){ const d=document.getElementById('dot'); d.className='dot '+(s==='on'?'on':s==='busy'?'busy':'') }
function scroll(){ const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

async function loadSettings(){
  chrome.runtime.sendMessage({type:'GET_SETTINGS'},s=>{ if(s?.provider) document.getElementById('prov').value=s.provider })
}
async function updateCtx(){
  const [tab]=await chrome.tabs.query({active:true,currentWindow:true})
  if(tab?.url&&!tab.url.startsWith('chrome://')){
    const el=document.getElementById('page-ctx')
    el.textContent=`Page: ${tab.title||tab.url}`; el.classList.add('show')
  }
}
async function checkHealth(){
  try{
    const r=await fetch('http://localhost:8765/health',{signal:AbortSignal.timeout(2000)})
    if(r.ok) setDot('on')
    else throw new Error()
  }catch{
    setDot('')
    const chat=document.getElementById('chat')
    const w=document.createElement('div')
    w.style.cssText='font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;padding:8px 10px;border-radius:9px;margin:4px 0;'
    w.textContent='Agent offline - run ./scripts/start.sh'; chat.appendChild(w)
  }
}
</script>
</body>
</html>
