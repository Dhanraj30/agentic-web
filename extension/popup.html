<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgenticWeb</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:290px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;color:#e5e5e5;background:#0f0f13}
.header{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#7c3aed}
.logo{width:22px;height:22px;background:rgba(255,255,255,.2);border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
h1{font-size:14px;font-weight:600;color:#fff;flex:1}
.sub{font-size:11px;color:rgba(255,255,255,.6)}
.body{padding:14px}
textarea{width:100%;height:70px;font-size:12px;padding:8px 10px;border:1px solid #374151;border-radius:8px;resize:none;font-family:inherit;background:#18181f;color:#e5e5e5;line-height:1.5}
textarea:focus{outline:none;border-color:#7c3aed}
.row{display:flex;gap:8px;margin-top:8px;align-items:center}
select{flex:1;font-size:11px;padding:5px 8px;border:1px solid #374151;border-radius:6px;background:#18181f;color:#e5e5e5}
.run{padding:5px 14px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.run:hover{background:#6d28d9}
.open{display:block;width:100%;margin-top:10px;padding:7px;text-align:center;font-size:11px;color:#a78bfa;border:1px solid #4c1d95;border-radius:6px;cursor:pointer;background:transparent}
.open:hover{background:#1e1b4b}
.status{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:#6b7280}
.dot{width:7px;height:7px;border-radius:50%;background:#374151}
.dot.on{background:#22c55e} .dot.off{background:#ef4444}
</style>
</head>
<body>
<div class="header">
  <div class="logo">AW</div>
  <h1>AgenticWeb</h1>
  <span class="sub">web agent</span>
</div>
<div class="body">
  <textarea id="goal" placeholder="Type a goal…&#10;e.g. Find cheapest BLR→GOA flight"></textarea>
  <div class="row">
    <select id="prov">
      <option value="azure_openai">Azure OpenAI (Microsoft)</option>
      <option value="gemini">Gemini (free)</option>
      <option value="openrouter_qwen">OpenRouter Qwen (free)</option>
      <option value="openrouter_free">OpenRouter Free Router</option>
      <option value="openrouter_auto">OpenRouter Auto (paid)</option>
      <option value="groq">Groq Llama 3.3 (free)</option>
      <option value="deepseek">DeepSeek V4 Flash</option>
      <option value="claude">Claude</option>
      <option value="openai">OpenAI</option>
    </select>
    <button class="run" onclick="run()">Run ➤</button>
  </div>
  <button class="open" onclick="openSidebar()">Open full sidebar ↗</button>
  <div class="status"><span class="dot" id="dot"></span><span id="stxt">Checking…</span></div>
</div>
<script>
document.addEventListener('DOMContentLoaded',()=>{ check(); load() })
document.getElementById('goal').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();run()} })
document.getElementById('prov').addEventListener('change',e=>{
  chrome.runtime.sendMessage({type:'SAVE_SETTINGS',provider:e.target.value})
})
function run(){
  const goal=document.getElementById('goal').value.trim()
  const p=document.getElementById('prov').value
  if(!goal) return
  chrome.runtime.sendMessage({type:'RUN_GOAL',goal,provider:p})
  openSidebar()
}
function openSidebar(){ chrome.windows.getCurrent(w=>{ chrome.sidePanel.open({windowId:w.id}); window.close() }) }
function load(){ chrome.runtime.sendMessage({type:'GET_SETTINGS'},s=>{ if(s?.provider) document.getElementById('prov').value=s.provider }) }
async function check(){
  try{
    const r=await fetch('http://localhost:8765/health',{signal:AbortSignal.timeout(2000)})
    const d=await r.json()
    document.getElementById('dot').className='dot on'
    document.getElementById('stxt').textContent=`Ready · ${d.providers?.default||'gemini'}`
  }catch{
    document.getElementById('dot').className='dot off'
    document.getElementById('stxt').textContent='Offline — run ./scripts/start.sh'
  }
}
</script>
</body>
</html>
